baseURL                = "https://gallantlab.org/"
title                  = "Gallant Lab"
languageCode           = "en-us"
defaultContentLanguage = "en"
timeZone               = "America/Los_Angeles"

enableRobotsTXT = true
disableKinds    = ["taxonomy", "term", "RSS"]

[params]
  description = "Cognitive, systems and computational neuroscience at UC Berkeley."
  dateFormat  = "January 2, 2006"
  # GA4 Measurement ID. Emitted site-wide by partials/analytics.html (prod builds
  # only, never on `hugo server`). Clear this value to disable analytics.
  googleAnalytics = "G-FN1W7DZ8ME"

